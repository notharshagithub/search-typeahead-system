services:
  frontend:
    build: ./frontend
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:5173 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - typeahead-net

  backend:
    build: ./backend
    ports:
      - '3001:3001'
    environment:
      - PORT=3001
      - DB_PATH=/app/data/typeahead.db
      - CACHE_NODES=cache-node-1:3002,cache-node-2:3002,cache-node-3:3002
      - RANKING_MODE=basic
    volumes:
      - ./data:/app/data
      - ./dataset:/app/dataset
    depends_on:
      cache-node-1:
        condition: service_healthy
      cache-node-2:
        condition: service_healthy
      cache-node-3:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:3001/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - typeahead-net

  cache-node-1:
    build: ./cache-node
    environment:
      - NODE_ID=cache-node-1
      - PORT=3002
    expose:
      - '3002'
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:3002/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - typeahead-net

  cache-node-2:
    build: ./cache-node
    environment:
      - NODE_ID=cache-node-2
      - PORT=3002
    expose:
      - '3002'
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:3002/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - typeahead-net

  cache-node-3:
    build: ./cache-node
    environment:
      - NODE_ID=cache-node-3
      - PORT=3002
    expose:
      - '3002'
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:3002/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - typeahead-net

networks:
  typeahead-net:
    driver: bridge
